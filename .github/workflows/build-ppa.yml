name: Build and upload to PPA

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-ppa.yml'
      - '.github/actions/**'
      - 'scripts/**'
      - 'patches/**'
      - 'debian-patches/**'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ppa-upload
  cancel-in-progress: false

env:
  OWNER: ${{ vars.OWNER }}
  PPA: ${{ vars.PPA }}
  SERIES: noble
  DEBEMAIL: ${{ vars.DEBEMAIL }}
  DEBFULLNAME: ${{ vars.OWNER }}
  DEBIAN_FRONTEND: noninteractive

jobs:
  stage1:
    name: Stage 1 (leaves)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package: [librime, yoga, fcitx5-gtk]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ppa-env
        with:
          gpg-key-id: ${{ secrets.GPG_KEY_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          series: ${{ env.SERIES }}
          owner: ${{ env.OWNER }}
          ppa: ${{ env.PPA }}
      - name: Resolve deb version
        id: ver
        run: |
          chmod +x scripts/*.sh
          scripts/resolve-deb-version.sh "${{ matrix.package }}"
      - name: Cache own debs
        uses: actions/cache@v4
        with:
          key: debs-${{ matrix.package }}-${{ env.SERIES }}-${{ steps.ver.outputs.deb_version }}
          path: ~/deb-cache/${{ matrix.package }}
      - name: Build and upload
        id: build
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          DEB_CACHE_DIR: ${{ runner.home }}/deb-cache/${{ matrix.package }}
        run: |
          chmod +x scripts/*.sh
          scripts/build-and-upload.sh "${{ matrix.package }}"

  stage2:
    name: Stage 2 (fcitx5)
    needs: stage1
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package: [fcitx5]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ppa-env
        with:
          gpg-key-id: ${{ secrets.GPG_KEY_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          series: ${{ env.SERIES }}
          owner: ${{ env.OWNER }}
          ppa: ${{ env.PPA }}
      - name: Resolve deb version (self)
        id: ver
        run: |
          chmod +x scripts/*.sh
          scripts/resolve-deb-version.sh "${{ matrix.package }}"
      - name: Resolve deb version (librime)
        id: ver_librime
        run: scripts/resolve-deb-version.sh librime
      - name: Resolve deb version (yoga)
        id: ver_yoga
        run: scripts/resolve-deb-version.sh yoga
      - name: Resolve deb version (fcitx5-gtk)
        id: ver_fcitx5_gtk
        run: scripts/resolve-deb-version.sh fcitx5-gtk
      - name: Restore debs (librime)
        uses: actions/cache/restore@v4
        with:
          key: debs-librime-${{ env.SERIES }}-${{ steps.ver_librime.outputs.deb_version }}
          path: ~/deb-cache/librime
      - name: Restore debs (yoga)
        uses: actions/cache/restore@v4
        with:
          key: debs-yoga-${{ env.SERIES }}-${{ steps.ver_yoga.outputs.deb_version }}
          path: ~/deb-cache/yoga
      - name: Restore debs (fcitx5-gtk)
        uses: actions/cache/restore@v4
        with:
          key: debs-fcitx5-gtk-${{ env.SERIES }}-${{ steps.ver_fcitx5_gtk.outputs.deb_version }}
          path: ~/deb-cache/fcitx5-gtk
      - name: Cache own debs
        uses: actions/cache@v4
        with:
          key: debs-${{ matrix.package }}-${{ env.SERIES }}-${{ steps.ver.outputs.deb_version }}
          path: ~/deb-cache/${{ matrix.package }}
      - name: Build local apt repo
        run: |
          chmod +x scripts/*.sh
          scripts/build-local-repo.sh "$HOME/deb-cache" "${{ runner.temp }}/local-repo"
      - name: Build and upload
        id: build
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          LOCAL_REPO_DIR: ${{ runner.temp }}/local-repo
          DEB_CACHE_DIR: ${{ runner.home }}/deb-cache/${{ matrix.package }}
        run: |
          chmod +x scripts/*.sh
          scripts/build-and-upload.sh "${{ matrix.package }}"

  stage3:
    name: Stage 3 (libime, fcitx5-qt, fcitx5-rime)
    needs: stage2
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package: [libime, fcitx5-qt, fcitx5-rime]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ppa-env
        with:
          gpg-key-id: ${{ secrets.GPG_KEY_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          series: ${{ env.SERIES }}
          owner: ${{ env.OWNER }}
