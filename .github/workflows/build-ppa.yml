name: Build and upload to PPA

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-ppa.yml'
      - '.github/actions/**'
      - 'scripts/**'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ppa-upload
  cancel-in-progress: false

env:
  OWNER: ${{ vars.OWNER }}
  PPA: ${{ vars.PPA }}
  SERIES: noble
  DEBEMAIL: ${{ vars.DEBEMAIL }}
  DEBFULLNAME: ${{ vars.OWNER }}
  DEBIAN_FRONTEND: noninteractive

jobs:
  stage1:
    name: Stage 1 (leaves)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package: [librime, yoga, fcitx5-gtk]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ppa-env
        with:
          gpg-key-id: ${{ secrets.GPG_KEY_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          series: ${{ env.SERIES }}
          owner: ${{ env.OWNER }}
          ppa: ${{ env.PPA }}
      - name: Build and upload
        id: build
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          ARTIFACT_DIR: ${{ runner.temp }}/artifacts
        run: |
          chmod +x scripts/*.sh
          scripts/build-and-upload.sh "${{ matrix.package }}"
      - name: Upload build artifacts
        if: always() && steps.build.outputs.uploaded_version != ''
        uses: actions/upload-artifact@v7
        with:
          name: debs-${{ matrix.package }}
          path: ${{ runner.temp }}/artifacts
          if-no-files-found: warn
          retention-days: 14
          overwrite: true

  stage2:
    name: Stage 2 (fcitx5)
    needs: stage1
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package: [fcitx5]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ppa-env
        with:
          gpg-key-id: ${{ secrets.GPG_KEY_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          series: ${{ env.SERIES }}
          owner: ${{ env.OWNER }}
          ppa: ${{ env.PPA }}
      - name: Download upstream artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: debs-*
          path: ${{ runner.temp }}/upstream
          merge-multiple: false
      - name: Build local apt repo
        run: |
          chmod +x scripts/*.sh
          scripts/build-local-repo.sh "${{ runner.temp }}/upstream" "${{ runner.temp }}/local-repo"
      - name: Build and upload
        id: build
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          ARTIFACT_DIR: ${{ runner.temp }}/artifacts
          LOCAL_REPO_DIR: ${{ runner.temp }}/local-repo
        run: |
          chmod +x scripts/*.sh
          scripts/build-and-upload.sh "${{ matrix.package }}"
      - name: Upload build artifacts
        if: always() && steps.build.outputs.uploaded_version != ''
        uses: actions/upload-artifact@v7
        with:
          name: debs-${{ matrix.package }}
          path: ${{ runner.temp }}/artifacts
          if-no-files-found: warn
          retention-days: 14
          overwrite: true

  stage3:
    name: Stage 3 (libime, fcitx5-qt, fcitx5-rime)
    needs: stage2
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package: [libime, fcitx5-qt, fcitx5-rime]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ppa-env
        with:
          gpg-key-id: ${{ secrets.GPG_KEY_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          series: ${{ env.SERIES }}
          owner: ${{ env.OWNER }}
          ppa: ${{ env.PPA }}
      - name: Download upstream artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: debs-*
          path: ${{ runner.temp }}/upstream
          merge-multiple: false
      - name: Build local apt repo
        run: |
          chmod +x scripts/*.sh
          scripts/build-local-repo.sh "${{ runner.temp }}/upstream" "${{ runner.temp }}/local-repo"
      - name: Build and upload
        id: build
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          ARTIFACT_DIR: ${{ runner.temp }}/artifacts
          LOCAL_REPO_DIR: ${{ runner.temp }}/local-repo
        run: |
          chmod +x scripts/*.sh
          scripts/build-and-upload.sh "${{ matrix.package }}"
      - name: Upload build artifacts
        if: always() && steps.build.outputs.uploaded_version != ''
        uses: actions/upload-artifact@v7
        with:
          name: debs-${{ matrix.package }}
          path: ${{ runner.temp }}/artifacts
          if-no-files-found: warn
          retention-days: 14
          overwrite: true

  stage4:
    name: Stage 4 (fcitx5-chinese-addons)
    needs: stage3
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package: [fcitx5-chinese-addons]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ppa-env
        with:
          gpg-key-id: ${{ secrets.GPG_KEY_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          series: ${{ env.SERIES }}
          owner: ${{ env.OWNER }}
          ppa: ${{ env.PPA }}
      - name: Download upstream artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: debs-*
          path: ${{ runner.temp }}/upstream
          merge-multiple: false
      - name: Build local apt repo
        run: |
          chmod +x scripts/*.sh
          scripts/build-local-repo.sh "${{ runner.temp }}/upstream" "${{ runner.temp }}/local-repo"
      - name: Build and upload
        id: build
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          ARTIFACT_DIR: ${{ runner.temp }}/artifacts
          LOCAL_REPO_DIR: ${{ runner.temp }}/local-repo
        run: |
          chmod +x scripts/*.sh
          scripts/build-and-upload.sh "${{ matrix.package }}"
      - name: Upload build artifacts
        if: always() && steps.build.outputs.uploaded_version != ''
        uses: actions/upload-artifact@v7
        with:
          name: debs-${{ matrix.package }}
          path: ${{ runner.temp }}/artifacts
          if-no-files-found: warn
          retention-days: 14
          overwrite: true
