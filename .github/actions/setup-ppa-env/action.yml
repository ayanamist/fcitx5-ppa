name: 'Setup PPA build environment'
description: 'apt sources, tools, GPG import, pbuilder chroot'
inputs:
  gpg-key-id:
    description: 'GPG key ID for debsign'
    required: true
  gpg-private-key:
    description: 'ASCII armored GPG private key'
    required: true
  gpg-passphrase:
    description: 'GPG private key passphrase'
    required: true
  series:
    description: 'Ubuntu series (noble, jammy, ...)'
    required: true
    default: noble
  owner:
    description: 'Launchpad account owning the PPA'
    required: true
  ppa:
    description: 'PPA name'
    required: true
runs:
  using: composite
  steps:
    - name: Configure Debian sid deb-src
      shell: bash
      run: |
        set -eux
        sudo apt-get update
        sudo apt-get install -y debian-archive-keyring
        sudo tee /etc/apt/sources.list.d/debian-sid.sources >/dev/null <<'EOF'
        Types: deb-src
        URIs: http://deb.debian.org/debian
        Suites: sid
        Components: main
        Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
        EOF
        sudo tee /etc/apt/preferences.d/99-debian-sid >/dev/null <<'EOF'
        Package: *
        Pin: release o=Debian
        Pin-Priority: -1
        EOF
        sudo apt-get update

    - name: Install build/upload tools
      shell: bash
      run: |
        sudo apt-get install -y --no-install-recommends \
          devscripts dput debhelper dpkg-dev \
          dh-sequence-gir gobject-introspection \
          pbuilder ubuntu-dev-tools \
          distro-info distro-info-data libdistro-info-perl \
          gnupg curl jq ca-certificates

    - name: Import GPG key
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg-private-key }}
        GPG_PASSPHRASE: ${{ inputs.gpg-passphrase }}
        GPG_KEY_ID: ${{ inputs.gpg-key-id }}
      run: |
        set -eu
        export GNUPGHOME="$RUNNER_TEMP/.gnupg"
        mkdir -p "$GNUPGHOME"
        chmod 700 "$GNUPGHOME"
        # 先写 conf 再 import,让 agent 起来就带 loopback
        cat > "$GNUPGHOME/gpg-agent.conf" <<EOF
        allow-loopback-pinentry
        default-cache-ttl 21600
        max-cache-ttl 31536000
        EOF
        cat > "$GNUPGHOME/gpg.conf" <<EOF
        pinentry-mode loopback
        no-tty
        batch
        EOF
        # 确保没老 agent 残留
        gpgconf --kill gpg-agent 2>/dev/null || true
        # 导入私钥,--pinentry-mode loopback 保 agent 不弹 tty
        echo "$GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback --import
        # 设置 ultimate trust (dput python-gpg verify 需要至少 marginal trust)
        echo "$GPG_KEY_ID:6:" | gpg --batch --import-ownertrust
        # 预热 passphrase 到 agent (让后续 debsign 直接命中 cache)
        echo "test" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
          --local-user "$GPG_KEY_ID" -as -o /dev/null || echo "::warning::passphrase warm-up failed"
        gpg --list-secret-keys "$GPG_KEY_ID"
        echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
        echo "DEBSIGN_KEYID=$GPG_KEY_ID" >> "$GITHUB_ENV"

    - name: Setup GPG wrapper for debsign
      shell: bash
      env:
        GPG_PASSPHRASE: ${{ inputs.gpg-passphrase }}
      run: |
        set -eu
        WRAP="$RUNNER_TEMP/gpg-wrapper.sh"
        cat > "$WRAP" <<EOS
        #!/usr/bin/env bash
        exec gpg --homedir "${GNUPGHOME}" --no-tty --batch --pinentry-mode loopback --passphrase "\${GPG_PASSPHRASE}" "\$@"
        EOS
        chmod +x "$WRAP"
        echo "DEBSIGN_PROGRAM=$WRAP" >> "$GITHUB_ENV"
        echo "GPG_PASSPHRASE=$GPG_PASSPHRASE" >> "$GITHUB_ENV"

    - name: Fetch PPA signing key
      shell: bash
      env:
        OWNER: ${{ inputs.owner }}
        PPA: ${{ inputs.ppa }}
      run: |
        set -eux
        sudo install -d -m 0755 /etc/apt/keyrings
        FPR="$(curl -fsSL "https://api.launchpad.net/1.0/~${OWNER}/+archive/ubuntu/${PPA}" | jq -r '.signing_key_fingerprint')"
        if [[ -z "$FPR" || "$FPR" == "null" ]]; then
          echo "::error::Cannot get PPA signing key fingerprint (PPA empty or not published yet?)"
          # PPA首次为空时无signing_key,首轮build需允许untrusted
          echo "PPA_ALLOW_UNTRUSTED=yes" >> "$GITHUB_ENV"
          exit 0
        fi
        echo "PPA signing key: $FPR"
        curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x${FPR}" \
          | sudo gpg --dearmor -o /etc/apt/keyrings/ppa-${OWNER}-${PPA}.gpg
        echo "PPA_KEYRING=/etc/apt/keyrings/ppa-${OWNER}-${PPA}.gpg" >> "$GITHUB_ENV"
        echo "PPA_ALLOW_UNTRUSTED=no" >> "$GITHUB_ENV"

    - name: Cache pbuilder chroot
      id: pbuilder-cache
      uses: actions/cache@v6
      with:
        path: /var/cache/pbuilder/base-${{ inputs.series }}.tgz
        key: pbuilder-${{ inputs.series }}-${{ github.run_id }}
        restore-keys: |
          pbuilder-${{ inputs.series }}-

    - name: Create pbuilder chroot if missing
      shell: bash
      env:
        SERIES: ${{ inputs.series }}
        OWNER: ${{ inputs.owner }}
        PPA: ${{ inputs.ppa }}
      run: |
        set -eux
        BASE="/var/cache/pbuilder/base-${SERIES}.tgz"
        # 生成pbuilderrc: 若已拿到PPA key用signed-by,否则允许untrusted(首轮空PPA)
        if [[ "${PPA_ALLOW_UNTRUSTED:-yes}" == "no" ]]; then
          KEYRING_LINE="OTHERMIRROR=\"deb [signed-by=${PPA_KEYRING}] http://ppa.launchpad.net/${OWNER}/${PPA}/ubuntu ${SERIES} main\""
          UNTRUSTED_LINE="ALLOWUNTRUSTED=no"
          # BINDMOUNTS让chroot访问keyring
          BINDMOUNTS_LINE="BINDMOUNTS=\"${PPA_KEYRING%/*}\""
        else
          KEYRING_LINE="OTHERMIRROR=\"deb http://ppa.launchpad.net/${OWNER}/${PPA}/ubuntu ${SERIES} main\""
          UNTRUSTED_LINE="ALLOWUNTRUSTED=yes"
          BINDMOUNTS_LINE=""
        fi
        sudo tee /etc/pbuilderrc >/dev/null <<EOF
        DISTRIBUTION=${SERIES}
        COMPONENTS="main universe"
        MIRRORSITE=http://archive.ubuntu.com/ubuntu
        ${KEYRING_LINE}
        ${UNTRUSTED_LINE}
        ${BINDMOUNTS_LINE}
        EOF
        if [[ ! -f "$BASE" ]]; then
          sudo pbuilder create --distribution "$SERIES" --basetgz "$BASE"
        else
          echo "reuse cached chroot: $BASE"
        fi
